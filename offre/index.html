 var dec=function(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;};
 var enc=new TextEncoder();
 async function derive(pw,salt){
  var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:D.iters,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 }
 async function tryUnlock(pw){
  for(var i=0;i<D.wraps.length;i++){
   var w=D.wraps[i];
   try{
    var wk=await derive(pw,dec(w.salt));
    var ckRaw=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(w.iv)},wk,dec(w.wrapped)));
    var ck=await crypto.subtle.importKey('raw',ckRaw,'AES-GCM',false,['decrypt']);
    var html=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(D.iv)},ck,dec(D.ct)));
    return {ok:true,role:w.role,html:html};
   }catch(e){}
  }
  return {ok:false};
 }
 function render(html){document.open();document.write(html);document.close();}
 async function boot(){
  var pw=null;try{pw=sessionStorage.getItem('ew_pass');}catch(e){}
  if(pw){var r=await tryUnlock(pw);if(r.ok){render(r.html);return;}}
  document.getElementById('f').addEventListener('submit',async function(ev){
   ev.preventDefault();
   var v=document.getElementById('pw').value;
   document.getElementById('e').textContent='';
   var r=await tryUnlock(v);
   if(r.ok){try{sessionStorage.setItem('ew_pass',v);}catch(e){}render(r.html);}
   else{document.getElementById('e').textContent='Code incorrect.';document.getElementById('pw').select();}
  });
 }
 if(!crypto||!crypto.subtle){document.getElementById('e').textContent='Navigateur non compatible.';}else{boot();}
