<title>Accès protégé — Everywhere</title>
<style>
:root{--noir:#14110f;--or:#c9a24b;--creme:#f3ecdd}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;
 background:radial-gradient(120% 120% at 50% 0%,#241f1a,var(--noir));color:var(--creme);
 display:flex;align-items:center;justify-content:center;padding:24px}
.card{max-width:420px;width:100%;text-align:center}
.mark{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--or);margin-bottom:18px}
.lock{font-size:40px;margin-bottom:14px}
h1{font-size:22px;font-weight:600;line-height:1.25;margin-bottom:8px}
p.sub{font-size:14px;color:#b9b0a0;margin-bottom:22px;line-height:1.5}
form{display:flex;gap:8px;flex-direction:column}
input{width:100%;background:#1c1814;border:1px solid rgba(201,162,75,.4);color:var(--creme);
 padding:14px 16px;font-size:16px;border-radius:8px;text-align:center;letter-spacing:.05em}
input:focus{outline:none;border-color:var(--or)}
button{background:var(--or);color:var(--noir);border:none;padding:14px;font-size:15px;font-weight:600;
 border-radius:8px;cursor:pointer;letter-spacing:.03em}
button:hover{filter:brightness(1.08)}
.err{color:#e6857a;font-size:13px;min-height:18px;margin-top:4px}
.foot{margin-top:26px;font-size:11px;color:#7c7364;line-height:1.5}
</style></head>

  return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:D.iters,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
 }
 async function tryUnlock(pw){
  for(var i=0;i<D.wraps.length;i++){
   var w=D.wraps[i];
   try{
    var wk=await derive(pw,dec(w.salt));
    var ckRaw=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(w.iv)},wk,dec(w.wrapped)));
    var ck=await crypto.subtle.importKey('raw',ckRaw,'AES-GCM',false,['decrypt']);
    var html=new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:dec(D.iv)},ck,dec(D.ct)));
    return {ok:true,role:w.role,html:html};
   }catch(e){}
  }
  return {ok:false};
 }
 function render(html){document.open();document.write(html);document.close();}
 async function boot(){
  var pw=null;try{pw=sessionStorage.getItem('ew_pass');}catch(e){}
  if(pw){var r=await tryUnlock(pw);if(r.ok){render(r.html);return;}}
  document.getElementById('f').addEventListener('submit',async function(ev){
   ev.preventDefault();
   var v=document.getElementById('pw').value;
   document.getElementById('e').textContent='';
   var r=await tryUnlock(v);
   if(r.ok){try{sessionStorage.setItem('ew_pass',v);}catch(e){}render(r.html);}
   else{document.getElementById('e').textContent='Code incorrect.';document.getElementById('pw').select();}
  });
 }
 if(!crypto||!crypto.subtle){document.getElementById('e').textContent='Navigateur non compatible.';}else{boot();}
})();
</script>
